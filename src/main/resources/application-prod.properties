# ══════════════════════════════════════════════════════
# PROFIL PRODUCTION — Render
# ══════════════════════════════════════════════════════

# Base de données
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require&channel_binding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool — limité pour Render free
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiration=86400000
security.jwt.refresh-token-expiration=2592000000

# Gemini
gemini.api.key=${GEMINI_API_KEY}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models
gemini.api.model=gemini-2.5-flash
gemini.api.max-output-tokens=8192
gemini.api.temperature=0.7
gemini.api.timeout-seconds=180
gemini.api.max-retries=2

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from.name=NorvyaStudy
spring.mail.from.email=${MAIL_FROM}

# R2
r2.account-id=${R2_ACCOUNT_ID}
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket-name=${R2_BUCKET_NAME}
r2.public-url=${R2_PUBLIC_URL}

# Logs — moins verbeux en prod
logging.level.root=WARN
logging.level.com.norvya=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/event-stream

spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

